<!doctype html>
<html lang="zh-CN" class="scroll-smooth">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内容后台 / Tao</title>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              glow: "#22d3ee",
              sakura: "#f472b6",
              amberline: "#f59e0b",
              mint: "#34d399"
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/js/admin.js"></script>
  </head>
  <body class="site-bg min-h-screen bg-zinc-50 text-zinc-900 antialiased dark:bg-zinc-950 dark:text-zinc-100">
    <header class="border-b border-zinc-200/70 bg-zinc-50/82 backdrop-blur-xl dark:border-zinc-800/80 dark:bg-zinc-950/78">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-5 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
        <div>
          <a href="/" class="small-link mb-4">
            <i data-lucide="arrow-left" class="h-4 w-4"></i>
            返回主站
          </a>
          <h1 class="text-3xl font-black">内容后台</h1>
        </div>
        <div class="grid gap-2 sm:min-w-[380px]">
          <label class="text-sm font-semibold text-zinc-500 dark:text-zinc-400" for="tokenInput">ADMIN_TOKEN</label>
          <div class="flex gap-2">
            <input id="tokenInput" class="form-input" type="password" autocomplete="current-password" placeholder="change-this-token">
            <button id="saveToken" class="icon-button shrink-0" type="button" title="保存 Token" aria-label="保存 Token">
              <i data-lucide="key-round" class="h-5 w-5"></i>
            </button>
            <button id="themeToggle" class="icon-button shrink-0" type="button" title="切换深浅色" aria-label="切换深浅色">
              <i data-lucide="moon" class="h-5 w-5"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-[260px_1fr] lg:px-8">
      <aside class="surface-card h-max p-3">
        <div id="tabs" class="grid gap-2"></div>
      </aside>

      <section class="grid gap-6">
        <div class="surface-card p-4 sm:p-5">
          <div class="mb-4 flex flex-col justify-between gap-4 md:flex-row md:items-center">
            <div>
              <p id="activeType" class="section-kicker mb-2">JSON</p>
              <h2 id="activeTitle" class="text-2xl font-black">站点配置</h2>
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="reloadButton" class="command-button" type="button">
                <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                刷新
              </button>
              <button id="templateButton" class="command-button" type="button">
                <i data-lucide="file-plus-2" class="h-4 w-4"></i>
                插入模板
              </button>
              <button id="saveButton" class="command-button command-button-primary" type="button">
                <i data-lucide="save" class="h-4 w-4"></i>
                保存
              </button>
            </div>
          </div>
          <textarea id="jsonEditor" class="form-input min-h-[520px] font-mono text-sm leading-6" spellcheck="false"></textarea>
          <p id="statusText" class="mt-3 min-h-6 text-sm text-zinc-500 dark:text-zinc-400" role="status"></p>
        </div>

        <div class="surface-card p-4 sm:p-5">
          <div class="mb-4 flex flex-col justify-between gap-4 md:flex-row md:items-center">
            <div>
              <p class="section-kicker mb-2">Tool Data</p>
              <h2 class="text-2xl font-black">自制工具数据</h2>
            </div>
            <button id="loadRecords" class="command-button" type="button">
              <i data-lucide="database" class="h-4 w-4"></i>
              读取记录
            </button>
          </div>
          <div class="grid gap-4 lg:grid-cols-[280px_1fr]">
            <div class="grid gap-3">
              <label class="grid gap-2 text-sm font-semibold">
                工具 ID
                <input id="toolIdInput" class="form-input" value="bookmark-vault">
              </label>
              <label class="grid gap-2 text-sm font-semibold">
                新记录 JSON
                <textarea id="recordPayload" class="form-input min-h-40 font-mono text-sm" spellcheck="false">{
  "title": "示例链接",
  "url": "https://example.com",
  "category": "收藏",
  "note": "可从这里测试工具数据接口"
}</textarea>
              </label>
              <button id="addRecord" class="command-button command-button-primary justify-center" type="button">
                <i data-lucide="plus" class="h-4 w-4"></i>
                新增记录
              </button>
            </div>
            <pre id="recordOutput" class="max-h-[360px] overflow-auto border border-zinc-200 bg-white/72 p-4 text-sm leading-6 dark:border-zinc-800 dark:bg-zinc-900/72"></pre>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
